name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
      
      - name: Run ruff
        run: ruff check .
      
      - name: Run black
        run: black --check .
      
      - name: Run mypy
        run: mypy license_server/src ca_desktop/backend/src shared/
        continue-on-error: true

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies (License Server UI)
        working-directory: license_server/ui
        run: npm ci
      
      - name: Lint License Server UI
        working-directory: license_server/ui
        run: npm run lint
      
      - name: Install dependencies (CA Desktop Frontend)
        working-directory: ca_desktop/frontend
        run: npm ci
      
      - name: Lint CA Desktop Frontend
        working-directory: ca_desktop/frontend
        run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./license_server[dev]
          pip install -e ./ca_desktop/backend[dev]
          pip install -e ./shared[dev]
      
      - name: Run License Server tests
        working-directory: license_server
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
        run: pytest --cov --cov-report=xml
      
      - name: Run CA Desktop Backend tests
        working-directory: ca_desktop/backend
        run: pytest --cov --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./license_server/coverage.xml,./ca_desktop/backend/coverage.xml
          fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Test CA Desktop Frontend
        working-directory: ca_desktop/frontend
        run: |
          npm ci
          npm run type-check
          npm run test:coverage

  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: integration_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./license_server[dev]
          pip install -e ./ca_desktop/backend[dev]
          pip install -e ./shared[dev]
          pip install playwright
          playwright install chromium
      
      - name: Run integration tests
        working-directory: tests/integration
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/integration_test
        run: pytest -v
