# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max_string_length = 4096

# version_locations =

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created in the script location
# sourceless = false

# logging configuration; this must be set to 'true' to enable the 'version' command
# logging = true

# set to 'true' to allow multiple versions to be present at once
# version_locations = versions

# version_locations = %(here)s/alembic/versions

# the sqlalchemy.url will be dynamically set in env.py
sqlalchemy.url = postgresql://license_admin:password@localhost:5432/license_server

[post_write_hooks]
# post_write_hooks allows scripts to be run after generating a migration file

# [post_write_hooks]
# black =
#   type = console_scripts
#   entrypoint = black
#   options = -l 79 REVISION_SCRIPT_FILENAME

[logging]
# logging configuration
default_handler = console

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
