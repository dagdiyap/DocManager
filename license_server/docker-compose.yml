version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ca_license_db
    environment:
      POSTGRES_DB: license_server
      POSTGRES_USER: license_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U license_admin -d license_server"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  license_server:
    build: .
    container_name: ca_license_server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://license_admin:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/license_server
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
      - "8001:8001"  # WebSocket port
    volumes:
      - ./src:/app/src
      - ./keys:/app/keys  # RSA keys
      - ./logs:/app/logs
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
